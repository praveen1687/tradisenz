<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 {
            color: #58a6ff;
            font-size: 3rem;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }
        #countdown {
            display: flex;
            gap: 20px;
            font-size: 1.5rem;
            font-weight: bold;
        }
        .time-box {
            background: #161b22;
            padding: 15px 20px;
            border-radius: 6px;
            border: 1px solid #30363d;
            min-width: 80px;
        }
        .label {
            font-size: 0.8rem;
            color: #8b949e;
            text-transform: uppercase;
            display: block;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <h1>Something Awesome is Coming</h1>
    <p>We are working hard to bring you the best experience. Stay tuned!</p>

    <div id="countdown">
        <div class="time-box"><span id="days">00</span><span class="label">Days</span></div>
        <div class="time-box"><span id="hours">00</span><span class="label">Hours</span></div>
        <div class="time-box"><span id="minutes">00</span><span class="label">Minutes</span></div>
        <div class="time-box"><span id="seconds">00</span><span class="label">Seconds</span></div>
    </div>

    <script>
        // Set your target launch date here
        const launchDate = new Date("Dec 31, 2026 00:00:00").getTime();

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = launchDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;

            if (distance < 0) {
                clearInterval(timer);
                document.getElementById("countdown").innerHTML = "<h3>We are Live!</h3>";
            }
        }, 1000);
    </script>
</body>
</html>
